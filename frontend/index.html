<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sales Automation</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f172a, #111827);
      color: white;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 25px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    input {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: none;
      border-radius: 10px;
      background: #1f2937;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.02);
    }

    h2 {
      margin-bottom: 20px;
    }

    .result-item {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🚀 AI Sales Automation</h1>

    <div class="card">

      <label>Prospect Name</label>
      <input type="text" id="prospectName" placeholder="Sarah Chen">

      <label>Prospect Company</label>
      <input type="text" id="prospectCompany" placeholder="Stripe">

      <label>Prospect Title</label>
      <input type="text" id="prospectTitle" placeholder="Product Manager">

      <button onclick="generateContent()">
        Generate
      </button>

    </div>

    <div class="card">
      <h2>Talking Points</h2>
      <div id="talkingPoints"></div>
    </div>

    <div class="card">
      <h2>Message Openers</h2>
      <div id="messageOpeners"></div>
    </div>

    <div class="card">
      <h2>Objections & Rebuttals</h2>
      <div id="objections"></div>
    </div>

  </div>

  <script>

    async function generateContent() {

      const name =
        document.getElementById('prospectName').value;

      const company =
        document.getElementById('prospectCompany').value;

      const title =
        document.getElementById('prospectTitle').value;

      try {

        const response = await fetch(
          'http://localhost:3000/api/personalize',
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              name,
              company,
              title
            })
          }
        );

        const data = await response.json();

        const talkingPointsDiv =
          document.getElementById('talkingPoints');

        const messageOpenersDiv =
          document.getElementById('messageOpeners');

        const objectionsDiv =
          document.getElementById('objections');

        talkingPointsDiv.innerHTML = '';
        messageOpenersDiv.innerHTML = '';
        objectionsDiv.innerHTML = '';

        data.talkingPoints.forEach(point => {

          talkingPointsDiv.innerHTML += `
            <div class="result-item">${point}</div>
          `;
        });

        data.messageOpeners.forEach(point => {

          messageOpenersDiv.innerHTML += `
            <div class="result-item">${point}</div>
          `;
        });

        data.objections.forEach(point => {

          objectionsDiv.innerHTML += `
            <div class="result-item">${point}</div>
          `;
        });

      } catch (error) {

        console.error(error);

        alert('Failed to fetch');

      }

    }

  </script>

</body>

</html>
